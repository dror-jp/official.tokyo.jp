baseURL = "https://official.tokyo.jp/"
title = "official.tokyo.jp"
defaultContentLanguage = "en"
enableRobotsTXT = true
disableKinds = ["taxonomy", "term"]

[languages]
  [languages.en]
    label = "English"
    contentDir = "content/en"
    weight = 1
  [languages.ja]
    label = "やさしい日本語"
    contentDir = "content/ja"
    weight = 2
  [languages.zh]
    label = "简体中文"
    contentDir = "content/zh"
    weight = 3
  [languages.vi]
    label = "Tiếng Việt"
    contentDir = "content/vi"
    weight = 4
  [languages.ne]
    label = "नेपाली"
    contentDir = "content/ne"
    weight = 5

[params]
  # Tier 2 languages: AI-translated from the English source of truth,
  # disclosed on every page. Tier 1 (en, ja) is human-verified.
  tier2 = ["zh", "vi", "ne"]
  tagline = "Find the official page — fast."
  notGovernment = "This is not a government website. We link to official sources."
  operatorName = "DroR Corporation"
  operatorUrl = "https://dror.co.jp"
  # Machine-readable data endpoint, kept in sync with data/wards.yaml at build time
  wardsApiPath = "/api/wards.json"

[outputFormats]
  [outputFormats.WardsJSON]
    mediaType = "application/json"
    baseName = "wards"
    isPlainText = true
    notAlternative = true
  [outputFormats.ProceduresJSON]
    mediaType = "application/json"
    baseName = "procedures"
    isPlainText = true
    notAlternative = true
  [outputFormats.GlossaryJSON]
    mediaType = "application/json"
    baseName = "glossary"
    isPlainText = true
    notAlternative = true
  [outputFormats.EmergencyJSON]
    mediaType = "application/json"
    baseName = "emergency"
    isPlainText = true
    notAlternative = true
  [outputFormats.MetaJSON]
    mediaType = "application/json"
    baseName = "meta"
    isPlainText = true
    notAlternative = true
  [outputFormats.LlmsFull]
    mediaType = "text/plain"
    baseName = "llms-full"
    isPlainText = true
    notAlternative = true
  [outputFormats.MD]
    mediaType = "text/markdown"
    baseName = "index"
    isPlainText = true
    notAlternative = true
[mediaTypes]
  [mediaTypes."text/markdown"]
    suffixes = ["md"]

[outputs]
  home = ["HTML", "RSS", "LlmsFull", "MD"]
  section = ["HTML", "MD"]
  page = ["HTML", "MD"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

[minify]
  disableXML = true

# Japanese terms that appear on official pages and at ward-office counters.
# Definitions per language (en, ja=やさしい日本語, zh, vi, ne) — definitional only.
terms:
  - ja_word: "住民票"
    romaji: "jūminhyō"
    en: "Resident record — the official proof that you live at your address. Banks and phone companies often ask for a copy."
    ja: "あなたが その住所に住んでいることを 証明する 役所の書類。銀行や携帯電話の契約で「写し（コピー）」を出すよう 言われます。"
    zh: "居民登记证明 — 证明你住在该住址的官方文件。银行和手机公司经常要求提供它的副本（写し）。"
    vi: "Phiếu cư trú — giấy tờ chính thức chứng minh bạn sống tại địa chỉ đó. Ngân hàng và công ty điện thoại thường yêu cầu bản sao."
    ne: "बसोबास प्रमाणपत्र — तपाईं त्यो ठेगानामा बस्नुहुन्छ भनी प्रमाणित गर्ने सरकारी कागज। बैंक र फोन कम्पनीले यसको प्रतिलिपि माग्छन्।"
  - ja_word: "転入届"
    romaji: "tennyū-todoke"
    en: "Moving-in notification — the form you submit at the ward office within 14 days of moving in."
    ja: "引っこしてから 14日以内に、区役所に出す紙です。"
    zh: "迁入申报 — 搬入后 14 天以内向区役所提交的表格。"
    vi: "Tờ khai chuyển đến — mẫu đơn nộp tại văn phòng quận trong vòng 14 ngày sau khi chuyển nhà."
    ne: "सरेको जानकारी दिने फारम — सरेको १४ दिनभित्र वडा कार्यालयमा बुझाउने फारम।"
  - ja_word: "転出届"
    romaji: "tenshutsu-todoke"
    en: "Moving-out notification — needed when you leave one Japanese municipality for another."
    ja: "日本の中で 別の町に引っこすとき、前の町の役所に出す紙です。"
    zh: "迁出申报 — 在日本国内搬到另一个城市时，向原来城市的役所提交的表格。"
    vi: "Tờ khai chuyển đi — cần nộp khi bạn chuyển từ một thành phố Nhật Bản sang thành phố khác."
    ne: "छोडेको जानकारी दिने फारम — जापानभित्रै अर्को सहरमा सर्दा पुरानो कार्यालयमा बुझाउने फारम।"
  - ja_word: "在留カード"
    romaji: "zairyū kādo"
    en: "Residence card — your ID as a mid- or long-term resident. Its address must be kept up to date."
    ja: "日本に長くいる外国人の 身分証（みぶんしょう）。住所は いつも新しいものに しておきます。"
    zh: "在留卡 — 中长期居留外国人的身份证件。上面的住址必须保持最新。"
    vi: "Thẻ cư trú (thẻ zairyū) — giấy tờ tùy thân của người nước ngoài ở Nhật lâu dài. Địa chỉ trên thẻ phải luôn là địa chỉ mới nhất."
    ne: "बसोबास कार्ड — जापानमा लामो समय बस्ने विदेशीको परिचयपत्र। यसमा भएको ठेगाना सधैँ नयाँ राख्नुपर्छ।"
  - ja_word: "マイナンバー"
    romaji: "mainanbā"
    en: "My Number — your 12-digit tax and social security number, assigned automatically after you register your address."
    ja: "税金や保険で使う 12けたの番号。住民登録をすると、自動で もらえます。"
    zh: "My Number（个人编号）— 用于税务和社会保险的 12 位号码。登记住址后自动获得。"
    vi: "My Number — mã số 12 chữ số dùng cho thuế và bảo hiểm xã hội, được cấp tự động sau khi đăng ký địa chỉ."
    ne: "माई नम्बर — कर र सामाजिक बीमाका लागि १२ अंकको नम्बर। ठेगाना दर्ता गरेपछि आफैँ पाइन्छ।"
  - ja_word: "区役所"
    romaji: "kuyakusho"
    en: "Ward office — the city hall of your ward, where most life procedures happen."
    ja: "あなたの区の 役所。生活の手続きの多くは ここでします。"
    zh: "区役所 — 你所在区的政府办公厅。大部分生活手续都在这里办理。"
    vi: "Văn phòng quận — tòa hành chính của quận bạn ở. Hầu hết thủ tục đời sống làm tại đây."
    ne: "वडा कार्यालय — तपाईंको वडाको सरकारी कार्यालय। धेरैजसो कागजी काम यहीँ हुन्छ।"
  - ja_word: "窓口"
    romaji: "madoguchi"
    en: "Counter / service window — the desk inside the office where a procedure is handled."
    ja: "役所の中で、手続きをする カウンターのことです。"
    zh: "窗口 — 役所里办理手续的柜台。"
    vi: "Quầy làm thủ tục — bàn tiếp nhận bên trong văn phòng, nơi xử lý thủ tục."
    ne: "काउन्टर (मादोगुची) — कार्यालयभित्र काम गरिने डेस्क।"
  - ja_word: "国民健康保険"
    romaji: "kokumin kenkō hoken"
    en: "National Health Insurance (kokuho) — the public health insurance you join at the ward office if your employer does not insure you."
    ja: "会社の保険がない人が 区役所で入る 健康保険。「国保（こくほ）」とも言います。"
    zh: "国民健康保险（国保）— 没有公司保险的人在区役所加入的公共医疗保险。"
    vi: "Bảo hiểm y tế quốc dân (kokuho) — bảo hiểm y tế công, đăng ký tại văn phòng quận nếu công ty không đóng bảo hiểm cho bạn."
    ne: "राष्ट्रिय स्वास्थ्य बीमा (कोकुहो) — कम्पनीको बीमा नहुनेहरूले वडा कार्यालयमा बुझाउने सार्वजनिक स्वास्थ्य बीमा।"
  - ja_word: "世帯主"
    romaji: "setainushi"
    en: "Head of household — the person listed as the household's representative on the resident record."
    ja: "いっしょに住む家族の中で、代表になる人のことです。"
    zh: "户主 — 在居民登记上作为家庭代表的人。"
    vi: "Chủ hộ — người đại diện cho cả gia đình trên phiếu cư trú."
    ne: "घरमूली — बसोबास प्रमाणपत्रमा परिवारको प्रतिनिधिका रूपमा लेखिने व्यक्ति।"
  - ja_word: "印鑑・はんこ"
    romaji: "inkan / hanko"
    en: "Personal seal — a stamp used instead of a signature in some procedures."
    ja: "サインのかわりに おす スタンプ。使う手続きと 使わない手続きが あります。"
    zh: "印章 — 在某些手续中代替签名使用的图章。"
    vi: "Con dấu cá nhân (hanko) — con dấu dùng thay chữ ký trong một số thủ tục."
    ne: "व्यक्तिगत छाप (हान्को) — केही कागजी काममा हस्ताक्षरको सट्टा प्रयोग हुने छाप।"
  - ja_word: "住所"
    romaji: "jūsho"
    en: "Address — written Japanese-style, from big to small: postal code, prefecture, ward, district, then block–building–room numbers."
    ja: "日本の住所は 大きい場所から 小さい場所の順に 書きます（都 → 区 → 町 → 番地）。"
    zh: "住址 — 日本的地址从大到小书写：邮编、都道府县、区、町，然后是番地・楼・房间号。"
    vi: "Địa chỉ — ở Nhật viết từ lớn đến nhỏ: mã bưu điện, tỉnh/thành, quận, khu phố, rồi số lô – tòa nhà – phòng."
    ne: "ठेगाना — जापानमा ठूलोबाट सानो क्रममा लेखिन्छ: हुलाक कोड, प्रान्त, वडा, टोल, अनि ब्लक–भवन–कोठा नम्बर।"
  - ja_word: "引越し"
    romaji: "hikkoshi"
    en: "Moving house — the event that starts the 14-day clock for your address procedures."
    ja: "新しい家に うつること。この日から「14日以内」の手続きが 始まります。"
    zh: "搬家 — 从这一天起，「14 天以内」的住址手续开始计时。"
    vi: "Chuyển nhà — từ ngày này bắt đầu tính thời hạn 14 ngày cho các thủ tục địa chỉ."
    ne: "घर सर्नु — यही दिनदेखि ठेगाना सम्बन्धी «१४ दिनभित्र» को समय सुरु हुन्छ।"

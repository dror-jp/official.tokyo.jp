# Ward data — the core asset of this project.
# RULES:
#   1. Never write a URL from memory. Every URL must be fetched and confirmed before it lands here.
#   2. Unverified fields stay as "TODO: verify" — never fill with a plausible guess.
#   3. Update last_verified whenever a ward's links are re-checked.
# SCHEMA NOTE: field names are city-agnostic on purpose (name_local, office_address) so this
# schema can be forked for any city, not just Tokyo. See strategy.html, charter article 6.


<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}">
<head>
  {{ partial "head.html" . }}
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>
  {{ partial "site-header.html" . }}
  {{ if in site.Params.tier2 site.Language.Lang }}
  <div class="ai-note"><div class="container">{{ i18n "aiTranslated" }}{{ with .Params.translated }} ({{ . }}){{ end }} — <a href="{{ range .AllTranslations }}{{ if eq .Language.Lang "en" }}{{ .RelPermalink }}{{ end }}{{ end }}">English</a></div></div>
  {{ end }}
  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "site-footer.html" . }}
  <script src="{{ "js/ward.js" | relURL }}" defer></script>
</body>
</html>
